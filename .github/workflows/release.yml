name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd server && npm ci
          cd ../client && npm ci
          cd .. && npm ci

      - name: Download TTS models
        run: node download-models.mjs

      - name: Build client
        run: cd client && node build.mjs

      - name: Build and publish
        run: npx electron-builder publish --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
